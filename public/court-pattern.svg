<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <!-- Technical court grid pattern — used as repeating texture at low opacity -->

  <!-- Main grid -->
  <line x1="70" y1="0"   x2="70"  y2="140" stroke="#6b2cff" stroke-width="0.6" opacity="0.55"/>
  <line x1="0"  y1="70"  x2="140" y2="70"  stroke="#6b2cff" stroke-width="0.6" opacity="0.55"/>

  <!-- Quarter lines -->
  <line x1="35"  y1="0"   x2="35"  y2="140" stroke="#6b2cff" stroke-width="0.35" opacity="0.25"/>
  <line x1="105" y1="0"   x2="105" y2="140" stroke="#6b2cff" stroke-width="0.35" opacity="0.25"/>
  <line x1="0"   y1="35"  x2="140" y2="35"  stroke="#6b2cff" stroke-width="0.35" opacity="0.25"/>
  <line x1="0"   y1="105" x2="140" y2="105" stroke="#6b2cff" stroke-width="0.35" opacity="0.25"/>

  <!-- Diagonal accents -->
  <line x1="0"  y1="0"   x2="70"  y2="70"  stroke="#6b2cff" stroke-width="0.3" opacity="0.12"/>
  <line x1="70" y1="70"  x2="140" y2="140" stroke="#6b2cff" stroke-width="0.3" opacity="0.12"/>
  <line x1="140" y1="0"  x2="70"  y2="70"  stroke="#00d9ff" stroke-width="0.3" opacity="0.10"/>
  <line x1="70"  y1="70" x2="0"   y2="140" stroke="#00d9ff" stroke-width="0.3" opacity="0.10"/>

  <!-- Corner dots -->
  <circle cx="0"   cy="0"   r="2" fill="#6b2cff" opacity="0.55"/>
  <circle cx="140" cy="0"   r="2" fill="#6b2cff" opacity="0.55"/>
  <circle cx="0"   cy="140" r="2" fill="#6b2cff" opacity="0.55"/>
  <circle cx="140" cy="140" r="2" fill="#6b2cff" opacity="0.55"/>

  <!-- Mid-edge dots -->
  <circle cx="70" cy="0"   r="1.2" fill="#6b2cff" opacity="0.35"/>
  <circle cx="70" cy="140" r="1.2" fill="#6b2cff" opacity="0.35"/>
  <circle cx="0"  cy="70"  r="1.2" fill="#6b2cff" opacity="0.35"/>
  <circle cx="140" cy="70" r="1.2" fill="#6b2cff" opacity="0.35"/>

  <!-- Center cross dot -->
  <circle cx="70" cy="70" r="2.5" fill="#6b2cff" opacity="0.45"/>

  <!-- Quarter cross dots -->
  <circle cx="35"  cy="35"  r="1.5" fill="#a855f7" opacity="0.28"/>
  <circle cx="105" cy="35"  r="1.5" fill="#a855f7" opacity="0.28"/>
  <circle cx="35"  cy="105" r="1.5" fill="#a855f7" opacity="0.28"/>
  <circle cx="105" cy="105" r="1.5" fill="#a855f7" opacity="0.28"/>

  <!-- Center micro-circle (court marker) -->
  <circle cx="70" cy="70" r="8" stroke="#6b2cff" stroke-width="0.5" fill="none" opacity="0.22"/>
</svg>
