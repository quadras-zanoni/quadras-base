<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="gM" cx="22%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#ff00d4" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#ff00d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff00d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="78%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#00d9ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gV" cx="50%" cy="58%" r="28%">
      <stop offset="0%" stop-color="#6b2cff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6b2cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0720"/>
      <stop offset="100%" stop-color="#05050e"/>
    </linearGradient>
    <linearGradient id="cl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00d4"/>
      <stop offset="48%" stop-color="#6b2cff"/>
      <stop offset="100%" stop-color="#00d9ff"/>
    </linearGradient>
    <linearGradient id="tf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050a" stop-opacity="1"/>
      <stop offset="45%" stop-color="#05050a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#05050a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="65%" stop-color="#05050a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="#05050a"/>

  <!-- Stars -->
  <circle cx="80"  cy="60"  r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="220" cy="35"  r="0.9" fill="#fff" opacity="0.35"/>
  <circle cx="390" cy="90"  r="1.0" fill="#fff" opacity="0.45"/>
  <circle cx="540" cy="48"  r="1.4" fill="#fff" opacity="0.3"/>
  <circle cx="700" cy="110" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="850" cy="30"  r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="1020" cy="75" r="0.9" fill="#fff" opacity="0.35"/>
  <circle cx="1180" cy="50" r="1.3" fill="#fff" opacity="0.4"/>
  <circle cx="1340" cy="95" r="0.8" fill="#fff" opacity="0.45"/>
  <circle cx="1500" cy="40" r="1.0" fill="#fff" opacity="0.3"/>
  <circle cx="1660" cy="80" r="1.2" fill="#fff" opacity="0.4"/>
  <circle cx="1810" cy="55" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="150"  cy="160" r="0.7" fill="#fff" opacity="0.25"/>
  <circle cx="460"  cy="190" r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="780"  cy="140" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="1100" cy="170" r="0.9" fill="#fff" opacity="0.22"/>
  <circle cx="1420" cy="155" r="0.7" fill="#fff" opacity="0.28"/>
  <circle cx="1760" cy="180" r="0.8" fill="#fff" opacity="0.2"/>

  <!-- Neon glows -->
  <rect width="1920" height="1080" fill="url(#gM)"/>
  <rect width="1920" height="1080" fill="url(#gC)"/>
  <rect width="1920" height="1080" fill="url(#gV)"/>

  <!-- Sand surface -->
  <polygon points="0,500 1920,500 1920,1080 0,1080" fill="url(#sand)"/>

  <!-- Court boundary lines (perspective) -->
  <!-- Left sideline -->
  <line x1="160" y1="840" x2="630" y2="518" stroke="url(#cl)" stroke-width="2.5" filter="url(#lg)" opacity="0.85"/>
  <!-- Right sideline -->
  <line x1="1760" y1="840" x2="1290" y2="518" stroke="url(#cl)" stroke-width="2.5" filter="url(#lg)" opacity="0.85"/>
  <!-- Baseline -->
  <line x1="160" y1="840" x2="1760" y2="840" stroke="#6b2cff" stroke-width="2.2" filter="url(#lg)" opacity="0.72"/>
  <!-- Net line -->
  <line x1="630" y1="518" x2="1290" y2="518" stroke="url(#cl)" stroke-width="3" filter="url(#sg)" opacity="0.9"/>

  <!-- Service line (inner) -->
  <line x1="300" y1="748" x2="1620" y2="748" stroke="#6b2cff" stroke-width="1.5" filter="url(#lg)" opacity="0.48"/>
  <!-- Center service line -->
  <line x1="960" y1="748" x2="960" y2="840" stroke="#a855f7" stroke-width="1.5" filter="url(#lg)" opacity="0.52"/>
  <!-- Net center strap hint -->
  <line x1="960" y1="504" x2="960" y2="532" stroke="#a855f7" stroke-width="2" filter="url(#lg)" opacity="0.45"/>

  <!-- Net posts -->
  <line x1="630"  y1="494" x2="630"  y2="542" stroke="#a855f7" stroke-width="2.5" filter="url(#lg)" opacity="0.6"/>
  <line x1="1290" y1="494" x2="1290" y2="542" stroke="#a855f7" stroke-width="2.5" filter="url(#lg)" opacity="0.6"/>
  <!-- Net mesh (horizontal lines) -->
  <line x1="630" y1="508" x2="1290" y2="508" stroke="#6b2cff" stroke-width="1" opacity="0.35"/>
  <line x1="630" y1="520" x2="1290" y2="520" stroke="#6b2cff" stroke-width="1" opacity="0.3"/>
  <line x1="630" y1="532" x2="1290" y2="532" stroke="#6b2cff" stroke-width="1" opacity="0.25"/>

  <!-- Light poles -->
  <!-- BL pole -->
  <rect x="145" y="350" width="6" height="495" fill="#0e0828" rx="3"/>
  <circle cx="148" cy="345" r="18" fill="#ff00d4" opacity="0.5" filter="url(#sg)"/>
  <circle cx="148" cy="345" r="5"  fill="#ffffff" opacity="0.85"/>
  <!-- BR pole -->
  <rect x="1769" y="350" width="6" height="495" fill="#0e0828" rx="3"/>
  <circle cx="1772" cy="345" r="18" fill="#00d9ff" opacity="0.5" filter="url(#sg)"/>
  <circle cx="1772" cy="345" r="5"  fill="#ffffff" opacity="0.85"/>
  <!-- FL pole -->
  <rect x="152" y="440" width="4" height="405" fill="#0e0828" rx="2"/>
  <circle cx="154" cy="435" r="11" fill="#ff00d4" opacity="0.35" filter="url(#sg)"/>
  <circle cx="154" cy="435" r="3"  fill="#ffaaee" opacity="0.7"/>
  <!-- FR pole -->
  <rect x="1764" y="440" width="4" height="405" fill="#0e0828" rx="2"/>
  <circle cx="1766" cy="435" r="11" fill="#00d9ff" opacity="0.35" filter="url(#sg)"/>
  <circle cx="1766" cy="435" r="3"  fill="#aaeeff" opacity="0.7"/>

  <!-- Fades -->
  <rect width="1920" height="420" fill="url(#tf)"/>
  <rect width="1920" height="1080" fill="url(#bf)"/>
  <rect width="1920" height="1080" fill="url(#vig)"/>
</svg>
